<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Veritas Eleitoral{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">V</div>
            <div>
                <div class="brand-name">Veritas Eleitoral</div>
                <div class="brand-tag">Fact-checking assistido por IA</div>
            </div>
        </div>
        <nav class="nav">
            <div class="nav-section">Visão Geral</div>
            <a href="{{ url_for('dashboard.index') }}" class="nav-link {% if request.endpoint == 'dashboard.index' %}active{% endif %}">
                <span class="nav-icon">◆</span>Dashboard
            </a>
            <div class="nav-section">Módulos</div>
            <a href="{{ url_for('veritas.lista') }}" class="nav-link {% if 'veritas' in (request.endpoint or '') %}active{% endif %}">
                <span class="nav-icon">✓</span>Veritas
                <span class="nav-status {% if kpi.checagens == 0 %}idle{% else %}pending{% endif %}" title="{% if kpi.checagens == 0 %}ocioso{% else %}ativo{% endif %}"></span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div>MVP · Veritas</div>
            <div style="margin-top: 4px;"><span class="live-dot"></span>Sistema operacional</div>
        </div>
    </aside>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
